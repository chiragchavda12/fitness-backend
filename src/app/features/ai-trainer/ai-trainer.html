<div class="ai-page">

    <div class="ai-container">

        <h1 class="title">🤖 AI Fitness Trainer</h1>

        <p class="subtitle">
            Get your personalized workout & diet plan instantly
        </p>

        <!-- FORM -->
        <div class="form-card">

            <h2>📋 Enter Your Details</h2>

            <div class="form-grid">

                <div class="form-group">
                    <label>Height (cm)</label>
                    <input type="number" placeholder="e.g. 170" [(ngModel)]="height">
                </div>

                <div class="form-group">
                    <label>Weight (kg)</label>
                    <input type="number" placeholder="e.g. 65" [(ngModel)]="weight">
                </div>

                <div class="form-group">
                    <label>Fitness Goal</label>
                    <select [(ngModel)]="goal">
                        <option value="Muscle Gain">💪 Muscle Gain</option>
                        <option value="Weight Loss">🔥 Weight Loss</option>
                        <option value="Stay Fit">⚖️ Stay Fit</option>
                    </select>
                </div>

            </div>

            <button class="generate-btn" (click)="generatePlan()">

                ⚡ Generate AI Plan

            </button>

        </div>


        <!-- RESULT -->
        <div class="result-card" *ngIf="result">

            <h2>📊 Your AI Fitness Plan</h2>

            <pre>{{result}}</pre>

        </div>


        <!-- TIPS -->
        <div class="tips-card">

            <h2>💡 Fitness Tips</h2>

            <p>
                Stay consistent, train smart and fuel your body properly.
                Small daily improvements lead to big results.
            </p>

        </div>

    </div>

</div>
