<nav class="navbar" [class.hide]="!isNavbarVisible" [class.show]="isNavbarVisible">

    <div class="nav-container">

        <!-- LOGO -->
        <div class="logo">
            <a routerLink="/">Fitness AI</a>
        </div>


        <!-- HAMBURGER -->
        <div class="hamburger" (click)="toggleMobileMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>


        <!-- NAV LINKS -->
        <ul class="nav-links" [class.active]="mobileMenuOpen">

            <li>
                <a routerLink="/" routerLinkActive="active" (click)="closeMenu()">Home</a>
            </li>

            <li>
                <a routerLink="/ai-trainer" routerLinkActive="active" (click)="closeMenu()">AI Trainer</a>
            </li>

            <li>
                <a routerLink="/workout" routerLinkActive="active" (click)="closeMenu()">Workout</a>
            </li>

            <li>
                <a routerLink="/diet" routerLinkActive="active" (click)="closeMenu()">Diet</a>
            </li>

            <li>
                <a routerLink="/bmi" routerLinkActive="active" (click)="closeMenu()">BMI</a>
            </li>

            <li>
                <a routerLink="/about" routerLinkActive="active" (click)="closeMenu()">About</a>
            </li>

            <li>
                <a routerLink="/contact" routerLinkActive="active" (click)="closeMenu()">Contact</a>
            </li>


            <!-- ACCOUNT MENU -->
            <li class="dropdown" *ngIf="isLoggedIn">

                <button class="drop-btn" (click)="toggleMenu()">
                    Account ▾
                </button>

                <ul class="dropdown-menu" *ngIf="menuOpen">

                    <li>
                        <a routerLink="/dashboard">Dashboard</a>
                    </li>

                    <li>
                        <a routerLink="/workout-history">History</a>
                    </li>

                    <li>
                        <a routerLink="/profile">Profile</a>
                    </li>

                    <li>
                        <button class="logout-btn" (click)="logout()">Logout</button>
                    </li>

                </ul>

            </li>


            <!-- LOGIN BUTTON -->
            <li *ngIf="!isLoggedIn">
                <button routerLink="/login" class="login-btn" (click)="closeMenu()">
                    Login
                </button>
            </li>

        </ul>

    </div>

</nav>
